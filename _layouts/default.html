<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != 'home' %}{{ page.title | escape }} - {% endif %}{{ site.title | escape }}</title>
    <meta name="description" content="{{ site.description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  </head>
  <body>
    <div class="site-marquee site-marquee-top" aria-hidden="true">
      <div class="site-marquee-track">
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
      </div>
    </div>

    <main>
      {{ content }}
    </main>

    <div class="site-marquee site-marquee-bottom" aria-hidden="true">
      <div class="site-marquee-track">
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
        <span>Play Work Draw</span>
      </div>
    </div>
  </body>
</html>
